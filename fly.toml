app = "jarvis-backend"

[build]

[env]
  JARVIS_MODEL_PROVIDER = "openrouter"
  PORT = "8080"

[[services]]
  http_checks = []
  internal_port = 8080
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    force_https = true
    port = 443
    handlers = ["http"]
    protocol = "tcp"

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    restart_limit = 6
    timeout = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
